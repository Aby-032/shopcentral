{% extends 'base.html' %}

{% block title %}
    Products
{% endblock %}

{% block heading %}
    Product List
{% endblock %}

{% block content %}

    <div class="main">

        {% for p in products %}

            <div>
                {% if p.image %}
                    <img src="{{ p.image.url }}">
                {% else %}
                    <p>No image available</p>
                {% endif %}
                <p>{{ p.name }}</p>
                <p>{{ p.price }}</p>
            </div>

        {% endfor %}

    </div>

{% endblock %}
