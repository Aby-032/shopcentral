<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            ShopCentral
        {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div>
            <a href="/">ShopCentral</a>
        </div>
        <div>
            <a href="/">Home</a>
            <a href="/products">Products</a>
            <a href="#">Link 2</a>
            <a href="#">Link 3</a>
            {% if user.is_authenticated %}
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </div>

    <!-- Main -->
    <div class="main">

        <h1>
            {% block heading %}
                Welcome!
            {% endblock %}
        </h1>

        {% block content %}
        {% endblock %}
        
    </div>
</body>
</html>
